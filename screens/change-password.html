<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Itibachok Barta - Change Password</title>
  <link rel="stylesheet" href="../css/theme.css">
  <style>
    .form-section {
      padding: var(--space-xl) var(--space-lg);
    }

    .form-group {
      margin-bottom: var(--space-xl);
    }

    .form-label {
      font-size: var(--font-sm);
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: var(--space-sm);
      display: block;
    }

    .input-wrapper {
      position: relative;
    }

    .form-input {
      width: 100%;
      padding: 14px 48px 14px 16px;
      background: var(--bg-input);
      border: 1.5px solid var(--border-color);
      border-radius: var(--radius-lg);
      color: var(--text-primary);
      font-size: var(--font-md);
      font-family: var(--font-family);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus {
      border-color: var(--accent-primary);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .toggle-eye {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toggle-eye svg {
      width: 20px;
      height: 20px;
      fill: var(--text-muted);
    }

    .forgot-link {
      display: inline-block;
      margin-top: var(--space-sm);
      font-size: var(--font-xs);
      color: var(--accent-primary);
      text-decoration: none;
      font-weight: 600;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .save-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent-primary);
      color: white;
      border: none;
      border-radius: var(--radius-lg);
      font-size: var(--font-md);
      font-weight: 700;
      font-family: var(--font-family);
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: var(--space-md);
    }

    .save-btn:hover {
      opacity: 0.9;
    }

    /* Success overlay */
    .success-overlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 500;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
    }

    .success-overlay.show {
      display: flex;
    }

    .success-card {
      text-align: center;
      padding: var(--space-2xl) var(--space-xl);
    }

    .success-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--success, #22c55e);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--space-lg);
    }

    .success-icon svg {
      width: 32px;
      height: 32px;
      fill: white;
    }

    .success-title {
      font-size: var(--font-xl);
      font-weight: 700;
      color: white;
      margin-bottom: var(--space-sm);
    }

    .success-desc {
      font-size: var(--font-sm);
      color: rgba(255,255,255,0.7);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <a href="../index.html" class="gallery-link" title="All Screens">
    <svg viewBox="0 0 24 24"><path d="M4 4h6v6H4V4zm10 0h6v6h-6V4zM4 14h6v6H4v-6zm10 0h6v6h-6v-6z"/></svg>
  </a>
  <div class="phone-frame">
    <div class="dynamic-island"></div>
    <div class="status-bar">
      <span class="time">9:41</span>
      <span class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </span>
    </div>
    <div class="top-bar">
      <a href="settings.html" class="back-btn"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></a>
      <span class="top-bar-title">Change Password</span>
      <div style="width: 36px;"></div>
    </div>
    <div class="screen-content">
      <div class="form-section">
        <div class="form-group">
          <label class="form-label">Current Password</label>
          <div class="input-wrapper">
            <input type="password" class="form-input" id="currentPw" placeholder="Enter current password">
            <button class="toggle-eye" onclick="toggleEye(this)">
              <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            </button>
          </div>
          <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
        </div>

        <div class="form-group">
          <label class="form-label">New Password</label>
          <div class="input-wrapper">
            <input type="password" class="form-input" id="newPw" placeholder="Enter new password">
            <button class="toggle-eye" onclick="toggleEye(this)">
              <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Confirm New Password</label>
          <div class="input-wrapper">
            <input type="password" class="form-input" id="confirmPw" placeholder="Re-enter new password">
            <button class="toggle-eye" onclick="toggleEye(this)">
              <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            </button>
          </div>
        </div>

        <button class="save-btn" onclick="savePassword()">Update Password</button>
      </div>
    </div>

    <!-- Success Overlay -->
    <div class="success-overlay" id="successOverlay">
      <div class="success-card">
        <div class="success-icon">
          <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        </div>
        <div class="success-title">Password Updated</div>
        <div class="success-desc">Your password has been changed successfully.</div>
      </div>
    </div>
  </div>

  <script>
    function toggleEye(btn) {
      var input = btn.parentElement.querySelector('input');
      if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46A11.804 11.804 0 001 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z" fill="var(--text-muted)"/></svg>';
      } else {
        input.type = 'password';
        btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" fill="var(--text-muted)"/></svg>';
      }
    }

    function savePassword() {
      var overlay = document.getElementById('successOverlay');
      overlay.classList.add('show');
      setTimeout(function() {
        window.location.href = 'settings.html';
      }, 2000);
    }
  </script>
  <script src="../js/theme.js"></script>
</body>
</html>
