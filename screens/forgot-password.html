<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Itibachak Barta - Forgot Password</title>
  <link rel="stylesheet" href="../css/theme.css">
  <style>
    .forgot-screen {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 0 var(--space-xl);
    }

    .forgot-icon {
      width: 72px;
      height: 72px;
      background: var(--bg-surface);
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: var(--space-3xl) auto var(--space-xl);
    }

    .forgot-icon svg { width: 36px; height: 36px; fill: var(--accent-primary); }

    .forgot-title { font-size: var(--font-2xl); font-weight: 700; text-align: center; }
    .forgot-desc {
      color: var(--text-secondary);
      font-size: var(--font-md);
      text-align: center;
      margin-top: var(--space-sm);
      line-height: 1.5;
    }

    .forgot-form {
      margin-top: var(--space-2xl);
      display: flex;
      flex-direction: column;
      gap: var(--space-lg);
    }

    /* Success state */
    .success-state {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding-top: var(--space-3xl);
    }

    .success-state.show { display: flex; }
    .form-state.hide { display: none; }

    .success-icon {
      width: 80px;
      height: 80px;
      background: rgba(0, 214, 143, 0.1);
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--space-xl);
      animation: popIn 0.5s ease-out;
    }

    .success-icon svg { width: 40px; height: 40px; fill: var(--success); }

    .success-title { font-size: var(--font-xl); font-weight: 700; }
    .success-desc {
      color: var(--text-secondary);
      font-size: var(--font-md);
      margin-top: var(--space-sm);
      line-height: 1.5;
    }

    @keyframes popIn {
      0% { transform: scale(0); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <a href="../index.html" class="gallery-link" title="All Screens">
    <svg viewBox="0 0 24 24"><path d="M4 4h6v6H4V4zm10 0h6v6h-6V4zM4 14h6v6H4v-6zm10 0h6v6h-6v-6z"/></svg>
  </a>
  <div class="phone-frame">
    <div class="dynamic-island"></div>
    <div class="status-bar">
      <span class="time">9:41</span>
      <span class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </span>
    </div>

    <div class="screen-content">
      <div class="forgot-screen">
        <div style="padding: var(--space-sm) 0;">
          <a href="login.html" class="back-btn">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          </a>
        </div>

        <div class="form-state" id="formState">
          <div class="forgot-icon">
            <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
          </div>

          <h1 class="forgot-title">Reset Password</h1>
          <p class="forgot-desc">Enter the email address associated with your account and we'll send you a verification code.</p>

          <form class="forgot-form" onsubmit="return false;">
            <div class="input-group">
              <label>Email Address</label>
              <div class="input-with-icon">
                <span class="input-icon">
                  <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" fill="currentColor"/></svg>
                </span>
                <input type="email" class="input-field" placeholder="Enter your email">
              </div>
            </div>

            <button class="btn btn-primary btn-full" onclick="window.location.href='reset-otp.html'">Send Verification Code</button>
          </form>

          <p style="text-align: center; margin-top: var(--space-xl); color: var(--text-muted); font-size: var(--font-sm);">
            Remember your password? <a href="login.html" style="color: var(--accent-primary); text-decoration: none;">Log In</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/theme.js"></script>
</body>
</html>
