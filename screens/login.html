<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Itibachak Barta - Login</title>
  <link rel="stylesheet" href="../css/theme.css">
  <style>
    .login-screen {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 0 var(--space-xl);
    }

    .login-header {
      text-align: center;
      padding-top: var(--space-xl);
    }

    .login-logo {
      width: 56px;
      height: 56px;
      background: var(--accent-gradient);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--space-lg);
      box-shadow: 0 4px 20px rgba(233, 69, 96, 0.25);
    }

    .login-logo svg { width: 32px; height: 32px; fill: white; }

    .login-header h1 {
      font-size: var(--font-2xl);
      font-weight: 700;
    }

    .login-header p {
      color: var(--text-secondary);
      font-size: var(--font-md);
      margin-top: var(--space-xs);
    }

    .login-form {
      margin-top: var(--space-2xl);
      display: flex;
      flex-direction: column;
      gap: var(--space-lg);
    }

    .forgot-link {
      text-align: right;
      margin-top: -4px;
    }

    .forgot-link a {
      color: var(--accent-primary);
      font-size: var(--font-sm);
      text-decoration: none;
    }

    .forgot-link a:hover { text-decoration: underline; }

    .login-footer {
      margin-top: auto;
      padding-bottom: var(--space-3xl);
      text-align: center;
    }

    .login-footer p {
      color: var(--text-secondary);
      font-size: var(--font-sm);
    }

    .login-footer a {
      color: var(--accent-primary);
      text-decoration: none;
      font-weight: 600;
    }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
    }

    .password-toggle svg { width: 20px; height: 20px; fill: var(--text-muted); }
    .apple-logo { color: var(--text-primary); }

    .nav-top {
      display: flex;
      align-items: center;
      padding: var(--space-sm) 0;
    }
  </style>
</head>
<body>
  <a href="../index.html" class="gallery-link" title="All Screens">
    <svg viewBox="0 0 24 24"><path d="M4 4h6v6H4V4zm10 0h6v6h-6V4zM4 14h6v6H4v-6zm10 0h6v6h-6v-6z"/></svg>
  </a>
  <div class="phone-frame">
    <div class="dynamic-island"></div>
    <div class="status-bar">
      <span class="time">9:41</span>
      <span class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </span>
    </div>

    <div class="screen-content">
      <div class="login-screen">
        <div class="nav-top" style="padding: var(--space-sm) 0;">
          <a href="splash.html" class="back-btn">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          </a>
        </div>

        <div class="login-header">
          <div class="login-logo">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </div>
          <h1>Welcome Back</h1>
          <p>Log in to your account</p>
        </div>

        <form class="login-form" onsubmit="return false;">
          <div class="input-group">
            <label>Email</label>
            <div class="input-with-icon">
              <span class="input-icon">
                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" fill="currentColor"/></svg>
              </span>
              <input type="email" class="input-field" placeholder="Enter your email">
            </div>
          </div>

          <div class="input-group">
            <label>Password</label>
            <div class="input-with-icon">
              <span class="input-icon">
                <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z" fill="currentColor"/></svg>
              </span>
              <input type="password" class="input-field" placeholder="Enter your password" id="password">
              <button class="password-toggle" onclick="togglePassword()">
                <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
              </button>
            </div>
          </div>

          <div class="forgot-link">
            <a href="forgot-password.html">Forgot Password?</a>
          </div>

          <button class="btn btn-primary btn-full" style="margin-top: var(--space-sm);" onclick="window.location.href='home.html'">Log In</button>
        </form>

        <div class="login-footer">
          <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/theme.js"></script>
  <script>
    function togglePassword() {
      const pwd = document.getElementById('password');
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
