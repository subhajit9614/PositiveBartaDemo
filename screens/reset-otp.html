<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Itibachok Barta - Reset OTP</title>
  <link rel="stylesheet" href="../css/theme.css">
  <style>
    .reset-otp-screen {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 0 var(--space-xl);
    }

    .nav-top {
      display: flex;
      align-items: center;
      padding: var(--space-sm) 0;
    }

    .step-indicator {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: var(--space-lg);
    }

    .step {
      width: 40px;
      height: 4px;
      border-radius: 2px;
      background: var(--border-color);
    }

    .step.done { background: var(--success); }
    .step.active { background: var(--accent-primary); }

    .otp-header {
      text-align: center;
      padding-top: var(--space-xl);
    }

    .otp-icon {
      width: 72px;
      height: 72px;
      background: var(--accent-subtle);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--space-lg);
    }

    .otp-icon svg {
      width: 36px;
      height: 36px;
      fill: var(--accent-primary);
    }

    .otp-header h1 {
      font-size: var(--font-2xl);
      font-weight: 700;
    }

    .otp-header p {
      color: var(--text-secondary);
      font-size: var(--font-md);
      margin-top: var(--space-xs);
      line-height: 1.5;
    }

    .email-highlight {
      color: var(--accent-primary);
      font-weight: 600;
    }

    .otp-inputs {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: var(--space-2xl);
    }

    .otp-input {
      width: 48px;
      height: 56px;
      border-radius: var(--radius-lg);
      border: 2px solid var(--border-color);
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
      font-family: var(--font-family);
    }

    .otp-input:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.15);
    }

    .otp-input.filled {
      border-color: var(--accent-primary);
      background: var(--accent-subtle);
    }

    .otp-actions {
      margin-top: var(--space-2xl);
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }

    .resend-row {
      text-align: center;
      margin-top: var(--space-lg);
    }

    .resend-row p {
      color: var(--text-secondary);
      font-size: var(--font-sm);
    }

    .resend-link {
      color: var(--accent-primary);
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      font-size: var(--font-sm);
      font-family: var(--font-family);
    }

    .resend-link:disabled {
      color: var(--text-muted);
      cursor: not-allowed;
    }

    .timer {
      color: var(--text-muted);
      font-size: var(--font-sm);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <a href="../index.html" class="gallery-link" title="All Screens">
    <svg viewBox="0 0 24 24"><path d="M4 4h6v6H4V4zm10 0h6v6h-6V4zM4 14h6v6H4v-6zm10 0h6v6h-6v-6z"/></svg>
  </a>
  <div class="phone-frame">
    <div class="dynamic-island"></div>
    <div class="status-bar">
      <span class="time">9:41</span>
      <span class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </span>
    </div>

    <div class="screen-content">
      <div class="reset-otp-screen">
        <div class="nav-top">
          <a href="forgot-password.html" class="back-btn">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          </a>
        </div>

        <div class="step-indicator">
          <div class="step done"></div>
          <div class="step active"></div>
          <div class="step"></div>
        </div>

        <div class="otp-header">
          <div class="otp-icon">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
          </div>
          <h1>Enter Verification Code</h1>
          <p>We've sent a 6-digit code to<br><span class="email-highlight">user@example.com</span></p>
        </div>

        <div class="otp-inputs" id="otpInputs">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]">
        </div>

        <div class="otp-actions">
          <button class="btn btn-primary btn-full" onclick="verifyOtp()">Verify Code</button>
        </div>

        <div class="resend-row">
          <p>Didn't receive the code?</p>
          <button class="resend-link" id="resendBtn" disabled onclick="resendCode()">
            Resend Code <span class="timer" id="timer">(30s)</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/theme.js"></script>
  <script>
    const inputs = document.querySelectorAll('.otp-input');

    inputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        const val = e.target.value.replace(/[^0-9]/g, '');
        e.target.value = val;
        if (val) {
          e.target.classList.add('filled');
          if (index < inputs.length - 1) inputs[index + 1].focus();
        } else {
          e.target.classList.remove('filled');
        }
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && index > 0) {
          inputs[index - 1].focus();
          inputs[index - 1].value = '';
          inputs[index - 1].classList.remove('filled');
        }
      });

      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasted = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 6);
        pasted.split('').forEach((char, i) => {
          if (inputs[index + i]) {
            inputs[index + i].value = char;
            inputs[index + i].classList.add('filled');
          }
        });
        const nextIndex = Math.min(index + pasted.length, inputs.length - 1);
        inputs[nextIndex].focus();
      });
    });

    inputs[0].focus();

    let countdown = 30;
    const timerEl = document.getElementById('timer');
    const resendBtn = document.getElementById('resendBtn');

    function startTimer() {
      countdown = 30;
      resendBtn.disabled = true;
      timerEl.style.display = 'inline';
      const interval = setInterval(() => {
        countdown--;
        timerEl.textContent = '(' + countdown + 's)';
        if (countdown <= 0) {
          clearInterval(interval);
          resendBtn.disabled = false;
          timerEl.style.display = 'none';
        }
      }, 1000);
    }

    startTimer();

    function resendCode() {
      startTimer();
      inputs.forEach(inp => { inp.value = ''; inp.classList.remove('filled'); });
      inputs[0].focus();
    }

    function verifyOtp() {
      window.location.href = 'reset-password.html';
    }
  </script>
</body>
</html>
