<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Itibachok Barta - Share Reel</title>
  <link rel="stylesheet" href="../css/theme.css">
  <style>
    .phone-frame { background: var(--bg-primary); }

    .share-backdrop {
      position: absolute; inset: 0; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px); z-index: 1;
    }

    .share-sheet {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: var(--bg-primary);
      border-radius: 20px 20px 0 0;
      z-index: 10;
      padding-bottom: 90px;
      max-height: 75%;
      overflow-y: auto;
    }

    .share-sheet-handle {
      width: 36px; height: 4px; background: var(--text-muted); border-radius: 2px;
      margin: 10px auto 0;
    }

    .share-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--space-md) var(--space-lg);
    }

    .share-title {
      font-size: var(--font-lg); font-weight: 700; color: var(--text-primary);
    }

    .share-close {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--bg-input); border: none;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }

    .share-close svg { width: 18px; height: 18px; fill: var(--text-secondary); }

    /* Search bar */
    .share-search {
      padding: 0 var(--space-lg) var(--space-md);
    }

    .share-search-wrap {
      position: relative;
    }

    .share-search-wrap svg {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; fill: var(--text-muted);
    }

    .share-search input {
      width: 100%; padding: 10px 14px 10px 36px;
      background: var(--bg-input); border: 1px solid var(--border-color);
      border-radius: var(--radius-full); color: var(--text-primary);
      font-size: var(--font-sm); font-family: var(--font-family); outline: none;
    }

    .share-search input::placeholder { color: var(--text-muted); }

    /* Section label */
    .share-section-label {
      font-size: var(--font-xs); font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
      padding: var(--space-sm) var(--space-lg);
    }

    /* In-app users horizontal scroll */
    .share-users-row {
      display: flex; gap: 16px; padding: var(--space-sm) var(--space-lg);
      overflow-x: auto; scrollbar-width: none;
    }

    .share-users-row::-webkit-scrollbar { display: none; }

    .share-user-item {
      display: flex; flex-direction: column; align-items: center;
      gap: 6px; min-width: 64px; cursor: pointer;
    }

    .share-user-item .avatar {
      width: 48px; height: 48px; font-size: 16px;
    }

    .share-user-name {
      font-size: 10px; color: var(--text-secondary);
      max-width: 64px; text-align: center;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .share-send-btn {
      background: var(--accent-primary); border: none;
      color: white; font-size: 10px; font-weight: 700;
      font-family: var(--font-family);
      padding: 4px 12px; border-radius: var(--radius-full);
      cursor: pointer; transition: all 0.2s;
    }

    .share-send-btn.sent {
      background: var(--success, #22c55e);
    }

    /* Divider */
    .share-divider {
      height: 1px; background: var(--border-color);
      margin: var(--space-md) var(--space-lg);
    }

    /* External share row */
    .share-external-row {
      display: flex; gap: 16px; padding: var(--space-sm) var(--space-lg);
      overflow-x: auto; scrollbar-width: none;
    }

    .share-external-row::-webkit-scrollbar { display: none; }

    .share-ext-item {
      display: flex; flex-direction: column; align-items: center;
      gap: 6px; min-width: 64px; cursor: pointer;
    }

    .share-ext-icon {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    .share-ext-icon svg { width: 24px; height: 24px; }

    .share-ext-icon.whatsapp { background: #25D366; }
    .share-ext-icon.instagram { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    .share-ext-icon.twitter { background: #000; }
    .share-ext-icon.facebook { background: #1877F2; }
    .share-ext-icon.copy-link { background: var(--bg-surface); border: 1px solid var(--border-color); }
    .share-ext-icon.copy-link svg { fill: var(--text-primary); }
    .share-ext-icon.more { background: var(--bg-surface); border: 1px solid var(--border-color); }
    .share-ext-icon.more svg { fill: var(--text-primary); }

    .share-ext-label {
      font-size: 10px; color: var(--text-secondary);
      text-align: center; white-space: nowrap;
    }

    /* Toast */
    .share-toast {
      position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: var(--success, #22c55e); color: white;
      padding: 10px 24px; border-radius: var(--radius-full);
      font-size: var(--font-sm); font-weight: 600;
      z-index: 200; opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }

    .share-toast.show { opacity: 1; }
  </style>
</head>

  <script>
    // Avatar colors
    var avatarGradients = [
      'linear-gradient(135deg, #667eea, #764ba2)',
      'linear-gradient(135deg, #f093fb, #f5576c)',
      'linear-gradient(135deg, #4facfe, #00f2fe)',
      'linear-gradient(135deg, #f5af19, #f12711)',
      'linear-gradient(135deg, #11998e, #38ef7d)',
      'linear-gradient(135deg, #fc5c7d, #6a82fb)',
      'linear-gradient(135deg, #f7971e, #ffd200)',
      'linear-gradient(135deg, #00c6ff, #0072ff)'
    ];

    function getAvatarColor(username) {
      var hash = 0;
      for (var i = 0; i < username.length; i++) {
        hash = username.charCodeAt(i) + ((hash << 5) - hash);
      }
      return avatarGradients[Math.abs(hash) % avatarGradients.length];
    }

    document.querySelectorAll('.avatar[data-username]').forEach(function(el) {
      el.style.background = getAvatarColor(el.dataset.username);
    });

    function sendShare(btn) {
      btn.classList.add('sent');
      btn.textContent = 'Sent!';
      var toast = document.getElementById('shareToast');
      var name = btn.closest('.share-user-item').querySelector('.share-user-name').textContent;
      toast.textContent = 'Reel sent to ' + name;
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 2000);
    }

    function copyLink(item) {
      var label = item.querySelector('.share-ext-label');
      label.textContent = 'Copied!';
      setTimeout(function() { label.textContent = 'Copy Link'; }, 2000);
    }
  </script>
