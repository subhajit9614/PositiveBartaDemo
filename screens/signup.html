<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Itibachok Barta - Sign Up</title>
  <link rel="stylesheet" href="../css/theme.css">
  <style>
    .signup-screen {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 0 var(--space-xl);
    }

    .signup-header {
      text-align: center;
      padding-top: var(--space-lg);
    }

    .signup-header h1 { font-size: var(--font-2xl); font-weight: 700; }
    .signup-header p { color: var(--text-secondary); font-size: var(--font-md); margin-top: var(--space-xs); }

    .signup-form {
      margin-top: var(--space-xl);
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }

    .username-check {
      font-size: var(--font-xs);
      margin-top: 2px;
    }
    .username-check.available { color: var(--success); }
    .username-check.taken { color: var(--error); }

    .password-strength {
      display: flex;
      gap: 4px;
      margin-top: 4px;
    }

    .strength-bar {
      flex: 1;
      height: 3px;
      background: var(--border-color);
      border-radius: 2px;
    }

    .strength-bar.filled { background: var(--success); }
    .strength-bar.medium { background: var(--warning); }
    .strength-bar.weak { background: var(--error); }

    .terms-text {
      font-size: var(--font-xs);
      color: var(--text-muted);
      text-align: center;
      line-height: 1.5;
    }

    .terms-text a {
      color: var(--accent-primary);
      text-decoration: none;
    }

    .signup-footer {
      margin-top: auto;
      padding-bottom: var(--space-3xl);
      text-align: center;
    }

    .signup-footer p { color: var(--text-secondary); font-size: var(--font-sm); }
    .signup-footer a { color: var(--accent-primary); text-decoration: none; font-weight: 600; }
    .apple-logo { color: var(--text-primary); }

    .nav-top {
      display: flex;
      align-items: center;
      padding: var(--space-sm) 0;
    }
  </style>
</head>
<body>
  <a href="../index.html" class="gallery-link" title="All Screens">
    <svg viewBox="0 0 24 24"><path d="M4 4h6v6H4V4zm10 0h6v6h-6V4zM4 14h6v6H4v-6zm10 0h6v6h-6v-6z"/></svg>
  </a>
  <div class="phone-frame">
    <div class="dynamic-island"></div>
    <div class="status-bar">
      <span class="time">9:41</span>
      <span class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </span>
    </div>

    <div class="screen-content">
      <div class="signup-screen">
        <div class="nav-top" style="padding: var(--space-sm) 0;">
          <a href="login.html" class="back-btn">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          </a>
        </div>

        <div class="signup-header">
          <h1>Create Account</h1>
          <p>Join the Itibachok Barta community</p>
        </div>

        <form class="signup-form" onsubmit="return false;">
          <div class="input-group">
            <label>Full Name</label>
            <div class="input-with-icon">
              <span class="input-icon">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="currentColor"/></svg>
              </span>
              <input type="text" class="input-field" placeholder="Your full name">
            </div>
          </div>

          <div class="input-group">
            <label>Email</label>
            <div class="input-with-icon">
              <span class="input-icon">
                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" fill="currentColor"/></svg>
              </span>
              <input type="email" class="input-field" placeholder="Enter your email">
            </div>
          </div>

          <div class="input-group">
            <label>Username</label>
            <div class="input-with-icon">
              <span class="input-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z" fill="currentColor"/></svg>
              </span>
              <input type="text" class="input-field" placeholder="Choose a username" id="username">
            </div>
            <!-- <span class="username-check available">@creativemind is available</span> -->
          </div>

          <div class="input-group">
            <label>Password</label>
            <div class="input-with-icon">
              <span class="input-icon">
                <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z" fill="currentColor"/></svg>
              </span>
              <input type="password" class="input-field" placeholder="Create a password">
            </div>
            <!-- <div class="password-strength">
              <div class="strength-bar filled"></div>
              <div class="strength-bar filled"></div>
              <div class="strength-bar medium"></div>
              <div class="strength-bar"></div>
            </div> -->
          </div>

          <div class="input-group">
            <label>Confirm Password</label>
            <div class="input-with-icon">
              <span class="input-icon">
                <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z" fill="currentColor"/></svg>
              </span>
              <input type="password" class="input-field" placeholder="Confirm your password">
            </div>
          </div>

          <button class="btn btn-primary btn-full" style="margin-top: var(--space-sm);" onclick="window.location.href='otp-verify.html'">Create Account</button>

          <!-- <div class="divider">or sign up with</div>

          <div class="social-login-row">
            <button class="social-btn">
              <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            </button>
            <button class="social-btn">
              <svg viewBox="0 0 24 24" fill="currentColor" class="apple-logo"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
            </button>
            <button class="social-btn">
              <svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#1877F2"/></svg>
            </button>
          </div> -->

          <p class="terms-text">
            By signing up, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
          </p>
        </form>

        <div class="signup-footer">
          <p>Already have an account? <a href="login.html">Log In</a></p>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/theme.js"></script>
</body>
</html>
